# Industrial Knowledge Brain — local backend stack.
# For production use hosted Supabase (Postgres + pgvector + Auth + Storage) and
# only run the `api` service. This compose file spins up a local pgvector Postgres
# so you can run fully offline.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ikb-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: ikb-api
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point at the local pgvector Postgres and auto-create tables.
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - AUTO_CREATE_TABLES=true
      # No Supabase locally -> auth off and local-disk storage.
      - AUTH_ENABLED=false

volumes:
  db_data:
